<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hologram TV Projector</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0; padding: 0; background-color: #000; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; width: 100vw; font-family: 'Orbitron', sans-serif;
            color: #fff; user-select: none;
        }

        /* Expanded projection field mapping */
        .holo-container {
            position: relative; width: 100vmin; height: 100vmin;
        }

        /* 33.33% static bounding limits isolate items, preventing overlap */
        .holo-video {
            position: absolute; width: 33.33%; height: 33.33%;
            object-fit: contain; mix-blend-mode: screen; 
            filter: contrast(1.3) brightness(1.1); 
            display: none;
        }

        /* scale(1.3) expands subjects out across bounds into the black void */
        .vid-top    { top: 0; left: 33.33%; transform: rotate(0deg) scale(1.3); }
        .vid-bottom { bottom: 0; left: 33.33%; transform: rotate(180deg) scale(1.3); }
        .vid-left   { top: 33.33%; left: 0; transform: rotate(-90deg) scale(1.3); }
        .vid-right  { top: 33.33%; right: 0; transform: rotate(90deg) scale(1.3); }

        #initOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 5000;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
        }
        #initOverlay h1 { color: #00ffcc; letter-spacing: 4px; text-align: center; line-height: 1.5; }

        #idleScreen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; color: #c67cb2; opacity: 0.5;
            animation: pulse 2s infinite; display: none;
        }

        #errorMessage {
            position: absolute; bottom: 20px; left: 20px; color: #ff4a4a; font-size: 0.8rem; z-index: 1000;
        }

        /* CONTROLS & HUD OVERLAYS */
        #fullscreenBtn {
            position: absolute; top: 30px; left: 30px;
            background: rgba(0, 0, 0, 0.6); color: #00ffcc;
            border: 1px solid #00ffcc; padding: 12px 24px;
            font-family: 'Orbitron', sans-serif; font-size: 0.9rem;
            cursor: pointer; z-index: 4000; border-radius: 4px;
            transition: all 0.3s; letter-spacing: 1px;
        }
        #fullscreenBtn:hover { background: #00ffcc; color: #000; box-shadow: 0 0 15px rgba(0, 255, 204, 0.5); }

        #skipBtn {
            position: absolute; bottom: 30px; right: 30px;
            background: rgba(0, 0, 0, 0.6); color: #ffb700;
            border: 1px solid #ffb700; padding: 12px 24px;
            font-family: 'Orbitron', sans-serif; font-size: 0.9rem;
            cursor: pointer; z-index: 4000; border-radius: 4px;
            transition: all 0.3s; letter-spacing: 1px; display: none; 
        }
        #skipBtn:hover { background: #ffb700; color: #000; box-shadow: 0 0 15px rgba(255, 183, 0, 0.5); }

        /* SCOREBOARD GRAPHICS MATRIX */
        #scoreboardOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 3000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        .score-title {
            color: #00ffcc; letter-spacing: 4px; font-size: 2.5rem;
            margin-bottom: 10px; text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }
        .score-number {
            color: #ff4a4a; font-size: 10rem; font-weight: 900;
            text-shadow: 0 0 20px rgba(255, 74, 74, 0.8); margin: 0;
        }
        .score-label { color: #fff; font-size: 1.5rem; letter-spacing: 2px; opacity: 0.8; }

        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 0.8; } 100% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div id="initOverlay">
        <h1>CLICK ANYWHERE TO<br>START PROJECTION SYSTEM</h1>
    </div>

    <div id="idleScreen">
        <h2>AWAITING NEXT PERFORMER...</h2>
    </div>

    <div id="errorMessage"></div>

    <button id="fullscreenBtn">⛶ FULLSCREEN</button>
    <button id="skipBtn">SKIP TRACK ⏭</button>

    <div id="scoreboardOverlay">
        <h2 class="score-title">PERFORMANCE COMPLETE</h2>
        <p class="score-label">CROWD ENGAGEMENT SCORE</p>
        <h1 class="score-number" id="finalScoreDisplay">0</h1>
    </div>

    <div class="holo-container">
        <video class="holo-video vid-top" playsinline></video>
        <video class="holo-video vid-bottom" playsinline></video>
        <video class="holo-video vid-left" playsinline></video>
        <video class="holo-video vid-right" playsinline></video>
    </div>

    <script>
        let db;
        let isPlaying = false;
        let currentObjectId = null;
        let currentVideoURL = null;
        let syncMonitorInterval = null; // Holds the hardware sync monitor engine

        const initOverlay = document.getElementById('initOverlay');
        const idleScreen = document.getElementById('idleScreen');
        const errDisplay = document.getElementById('errorMessage');
        const videos = document.querySelectorAll('.holo-video');
        const mainVideoTracker = videos[0]; // Master Clock node
        const skipBtn = document.getElementById('skipBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const scoreboardOverlay = document.getElementById('scoreboardOverlay');
        const finalScoreDisplay = document.getElementById('finalScoreDisplay');

        // DISPLAY MANAGEMENT ENGINE (FULLSCREEN INTERFACE)
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    errDisplay.innerText = `Display Error: ${err.message}`;
                });
                fullscreenBtn.innerHTML = "✖ EXIT FULLSCREEN";
            } else {
                document.exitFullscreen();
                fullscreenBtn.innerHTML = "⛶ FULLSCREEN";
            }
        });

        // SYSTEM FILE INITIALIZATION
        initOverlay.addEventListener('click', () => {
            initOverlay.style.display = 'none';
            
            const request = indexedDB.open("HoloBuskingSystem", 3); 
            
            request.onupgradeneeded = (e) => {
                const database = e.target.result;
                if (!database.objectStoreNames.contains("videoQueue")) {
                    database.createObjectStore("videoQueue", { keyPath: "id", autoIncrement: true });
                }
            };

            request.onsuccess = (e) => {
                db = e.target.result;
                setInterval(checkQueue, 2000); 
                checkQueue();
            };

            request.onerror = (e) => {
                errDisplay.innerText = "Local Database Error: " + e.target.error.message;
            };
        });

        // ASYNC TELEMETRY BROKER (SCORE READOUT)
        async function handleVideoEnd() {
            // Stop the active sync looping module immediately
            if (syncMonitorInterval) {
                clearInterval(syncMonitorInterval);
                syncMonitorInterval = null;
            }

            // Halt presentation nodes immediately
            videos.forEach(vid => vid.style.display = 'none');
            skipBtn.style.display = 'none';

            // Swap viewport content cards
            scoreboardOverlay.style.display = 'flex';
            finalScoreDisplay.innerText = "...";
            finalScoreDisplay.style.fontSize = "4rem";

            try {
                const response = await fetch('http://localhost:5000/get_score');
                const data = await response.json();
                
                finalScoreDisplay.style.fontSize = "10rem"; 
                finalScoreDisplay.innerText = data.score;
                
                await fetch('http://localhost:5000/reset_score', { method: 'POST' });
                
            } catch (err) {
                console.warn("Telemetry Server offline.", err);
                finalScoreDisplay.style.fontSize = "3rem";
                finalScoreDisplay.innerText = "DATA ACCESS ERROR"; 
            }

            setTimeout(() => {
                scoreboardOverlay.style.display = 'none';
                clearCurrentVideoAndProceed();
            }, 7000);
        }

        // QUEUE LOGISTICS ENGINE
        function checkQueue() {
            if (isPlaying || !db) return;

            try {
                const tx = db.transaction("videoQueue", "readonly");
                const store = tx.objectStore("videoQueue");
                const request = store.openCursor(); 

                request.onsuccess = (e) => {
                    const cursor = e.target.result;
                    if (cursor) {
                        playVideo(cursor.value, cursor.key);
                    } else {
                        showIdleScreen();
                    }
                };
            } catch (err) {
                errDisplay.innerText = "Transaction error: " + err.message;
            }
        }

        // PLAYBACK AND PROJECTION CONTROLLER
        function playVideo(videoData, id) {
            isPlaying = true;
            currentObjectId = id;
            idleScreen.style.display = 'none';
            skipBtn.style.display = 'block'; 
            errDisplay.innerText = "";

            if (currentVideoURL) URL.revokeObjectURL(currentVideoURL);
            currentVideoURL = URL.createObjectURL(videoData.file);

            videos.forEach((vid, index) => {
                vid.src = currentVideoURL;
                vid.style.display = 'block';
                
                if (index === 0) {
                    vid.muted = false; 
                    vid.volume = 1.0;
                } else {
                    vid.muted = true; 
                }

                vid.play().catch(e => {
                    errDisplay.innerText = "Hardware lock active. Touch screen canvas to link audio nodes.";
                });
            });

            // Start the hardware tracking engine loop (runs every 150ms)
            startSyncMonitor();
        }

        // DYNAMIC SNAP-SYNC CONTROLLER ENGINE
        function startSyncMonitor() {
            if (syncMonitorInterval) clearInterval(syncMonitorInterval);

            syncMonitorInterval = setInterval(() => {
                if (!isPlaying) return;

                const masterTime = mainVideoTracker.currentTime;

                videos.forEach((vid, index) => {
                    // Skip checking the master track itself
                    if (index > 0) {
                        // Calculate how far out of sync this track is
                        const timeDifference = Math.abs(vid.currentTime - masterTime);

                        // If out of alignment by more than 50 milliseconds, force-snap it back!
                        if (timeDifference > 0.05) {
                            vid.currentTime = masterTime;
                            
                            // Prevent video freeze by forcing it to keep running with the master state
                            if (mainVideoTracker.paused && !vid.paused) {
                                vid.pause();
                            } else if (!mainVideoTracker.paused && vid.paused) {
                                vid.play().catch(() => {});
                            }
                        }
                    }
                });
            }, 150); // Scans alignment 6 times every second
        }

        function clearCurrentVideoAndProceed() {
            if (syncMonitorInterval) {
                clearInterval(syncMonitorInterval);
                syncMonitorInterval = null;
            }

            videos.forEach(vid => {
                vid.style.display = 'none';
                vid.src = '';
            });

            if (currentVideoURL) {
                URL.revokeObjectURL(currentVideoURL);
                currentVideoURL = null;
            }

            try {
                const tx = db.transaction("videoQueue", "readwrite");
                const store = tx.objectStore("videoQueue");
                const deleteReq = store.delete(currentObjectId);
                
                deleteReq.onsuccess = () => {
                    isPlaying = false;
                    checkQueue(); 
                };
                deleteReq.onerror = (e) => {
                    errDisplay.innerText = "Cache cleanup failed: " + e.target.error.message;
                    isPlaying = false; 
                };
            } catch(err) {
                errDisplay.innerText = "System memory fault: " + err.message;
                isPlaying = false;
            }
        }

        // EVENT INTERFACES
        mainVideoTracker.addEventListener('ended', handleVideoEnd);

        skipBtn.addEventListener('click', () => {
            if(isPlaying) {
                mainVideoTracker.pause();
                handleVideoEnd();
            }
        });

        function showIdleScreen() {
            idleScreen.style.display = 'block';
        }
    </script>
</body>
</html>
